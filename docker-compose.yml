x-logging: &logging
  driver: json-file
  options:
    max-size: 100m
    max-file: '5'

services:
  bot:
    image: registry.gitlab.com/pawabot/pawa:${VERSION}
    init: true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 6G
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - APP_URL=${APP_URL}
      - BOT_ACTIVITY=${BOT_ACTIVITY}
      - BOT_DATA_DIR=${BOT_DATA_DIR}
      - BOT_FILE_FORMAT=${BOT_FILE_FORMAT}
      - BOT_HTTP_PORT=${BOT_HTTP_PORT}
      - BOT_GUILD_WHITELIST=${BOT_GUILD_WHITELIST}
      - BOT_LEAVE_GUILD_AFTER=${BOT_LEAVE_GUILD_AFTER}
      - BOT_MAINTENANCE=${BOT_MAINTENANCE}
      - BOT_MP3_VBR=${BOT_MP3_VBR}
      - BOT_PREFIX_COMMANDS=${BOT_PREFIX_COMMANDS}
      - BOT_RECORDER_TYPE=${BOT_RECORDER_TYPE}
      - BOT_STANDALONE=${BOT_STANDALONE}
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_WEBSITE=${BOT_WEBSITE}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DS_ACCESS_KEY=${DS_ACCESS_KEY}
      - DS_BASEURL=${DS_BASEURL}
      - DS_BUCKET=${DS_BUCKET}
      - DS_HOST=${DS_HOST}
      - DS_REGION=${DS_REGION}
      - DS_SECRET_KEY=${DS_SECRET_KEY}
      - OVERRIDE_FILE=${OVERRIDE_FILE}
      - TRACING_API_KEY=${TRACING_API_KEY}
      - TZ=${TZ}
      - JAVA_TOOL_OPTIONS=-Dlog4j.configurationFile=log4j2-prod.xml
                          -XX:MinRAMPercentage=${JVM_MIN_RAM_PERCENTAGE}
                          -XX:MaxRAMPercentage=${JVM_MAX_RAM_PERCENTAGE}
                          -XX:+CrashOnOutOfMemoryError
                          -XX:+HeapDumpOnOutOfMemoryError
                          -XX:HeapDumpPath=${BOT_DATA_DIR}/dumps
                          -XX:+UseCompactObjectHeaders
      - HONEYCOMB_API_KEY=${HONEYCOMB_API_KEY}
      - SERVICE_NAME=${SERVICE_NAME}
      - SAMPLE_RATE=${SAMPLE_RATE}
      - OTEL_JAVAAGENT_ENABLED=false
    ports:
      - "127.0.0.1:7888:7888"
    restart: unless-stopped
    volumes:
      - ./data:${BOT_DATA_DIR}
      - ./logs:/app/logs
    logging:
      <<: *logging
  database:
    image: postgres:17.2-alpine
    command: >
      -c logging_collector=on
      -c log_directory=logs
      -c log_min_duration_statement=0
      -c log_statement=none
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
  pghero:
    image: ankane/pghero
    restart: on-failure:100
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD_URL_ENCODED}@database:5432/${DB_NAME}
    ports:
      - "127.0.0.1:8080:8080"
    logging:
      <<: *logging
