# AutoRecord
autorecord.all=Will automatically record any audio channel with %s or more people.
autorecord.none=Will not automatically record any audio channel.
autorecord.one=Will automatically record %s when there are %s or more people.
autorecord.some=Will not automatically record %s.
autorecord.not_found=Could not find audio channel.
autorecord.description=Will automatically record audio channel after a certain number of people join.

# AutoSave
autosave.noop=Could not toggle autosave option.
autosave.off=Not saving at the end of each session.
autosave.on=Automatically saving at the end of each session.

# AutoStop
autostop.all==Will automatically leave any voice channel with %s or less people.
autostop.none=Will not automatically stop recording any channel.
autostop.one=Will automatically stop recording %s when there are %s or less people.
autostop.some=Will not automatically stop recording %s.

# Ignore
ignore.beta=Command currently in beta, use at your own discretion!
ignore.ignore=Ignoring the following users: %s
ignore.not_recording=Can't use command if not recording.

